name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Inject the real Client ID (stored as a repo secret) into config.js.
      # The placeholder in config.js is replaced only in the deployed build —
      # it never gets committed back to the repo.
      - name: Inject Google Client ID
        run: |
          sed -i "s|YOUR_CLIENT_ID_HERE.apps.googleusercontent.com|${{ secrets.GOOGLE_CLIENT_ID }}|g" config.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # deploy the whole repo root

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
